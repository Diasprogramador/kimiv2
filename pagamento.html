<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - LilaMarket</title>
    <!-- Importação das fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Arquivo de estilos CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- CABEÇALHO PRINCIPAL DO SITE -->
    <!-- ============================================ -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-content">
                <!-- Logo do site com link para a home -->
                <a href="../index.html" class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </div>
                    <span class="logo-text">Lila<span>Market</span></span>
                </a>

                <!-- Menu de navegação para desktop -->
                <nav class="nav-desktop">
                    <a href="../index.html" class="nav-link">Home</a>
                    <!-- Aba de Cursos - destaque no menu -->
                    <a href="cursos.html" class="nav-link">Cursos</a>
                    <a href="../index.html#produtos" class="nav-link">Produtos</a>
                    <a href="rastreamento.html" class="nav-link">Meus Pedidos</a>
                </nav>

                <!-- Ações do cabeçalho: login e carrinho -->
                <div class="header-actions">
                    <a href="login.html" class="icon-btn user-btn" title="Login">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </a>
                    <button class="icon-btn cart-btn" id="cartBtn" title="Carrinho">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </button>
                    <button class="menu-toggle" id="menuToggle">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================ -->
    <!-- MENU MOBILE (SLIDE DA DIREITA) -->
    <!-- ============================================ -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <a href="../index.html" class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <span class="logo-text">Lila<span>Market</span></span>
            </a>
            <button class="menu-close" id="menuClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <nav class="mobile-nav">
            <a href="../index.html" class="mobile-nav-link">Home</a>
            <!-- Aba de Cursos no menu mobile -->
            <a href="cursos.html" class="mobile-nav-link">Cursos</a>
            <a href="../index.html#produtos" class="mobile-nav-link">Produtos</a>
            <a href="rastreamento.html" class="mobile-nav-link">Meus Pedidos</a>
            <a href="login.html" class="mobile-nav-link">Entrar / Cadastrar</a>
        </nav>
    </div>

    <!-- ============================================ -->
    <!-- CONTEÚDO PRINCIPAL - PAGAMENTO -->
    <!-- ============================================ -->
    <main class="pagamento-page">
        <div class="pagamento-container">
            <div class="pagamento-header">
                <h1>Finalizar Compra</h1>
            </div>

            <div class="pagamento-grid">
                <!-- Formulário de Pagamento -->
                <div class="pagamento-form">
                    <h3>Forma de Pagamento</h3>

                    <!-- Opções de pagamento -->
                    <div class="payment-methods">
                        <label class="payment-method active">
                            <input type="radio" name="payment" value="card" checked>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                <line x1="1" y1="10" x2="23" y2="10"></line>
                            </svg>
                            <span>Cartão de Crédito</span>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="pix">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <path d="M21 15l-5-5L5 21"></path>
                            </svg>
                            <span>PIX</span>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="boleto">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            <span>Boleto Bancário</span>
                        </label>
                    </div>

                    <h3 style="margin-top: 2rem;">Dados do Cartão</h3>

                    <form id="paymentForm">
                        <div class="form-group">
                            <label for="cardName">Nome no Cartão</label>
                            <input type="text" id="cardName" placeholder="Como aparece no cartão" required>
                        </div>

                        <div class="form-group">
                            <label for="cardNumber">Número do Cartão</label>
                            <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="cardExpiry">Validade</label>
                                <input type="text" id="cardExpiry" placeholder="MM/AA" maxlength="5" required>
                            </div>
                            <div class="form-group">
                                <label for="cardCvv">CVV</label>
                                <input type="text" id="cardCvv" placeholder="123" maxlength="3" required>
                            </div>
                        </div>

                        <h3 style="margin-top: 2rem;">Dados Pessoais</h3>

                        <div class="form-group">
                            <label for="fullName">Nome Completo</label>
                            <input type="text" id="fullName" placeholder="Seu nome completo" required>
                        </div>

                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" placeholder="seu@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1.5rem;">
                            Pagar Agora
                        </button>
                    </form>
                </div>

                <!-- Resumo do Pedido -->
                <div class="resumo-pedido">
                    <h3>Resumo do Pedido</h3>

                    <div id="resumoItems">
                        <!-- Items loaded by JS -->
                    </div>

                    <div class="resumo-item">
                        <span>Subtotal</span>
                        <span id="resumoSubtotal">R$ 0,00</span>
                    </div>
                    <div class="resumo-item">
                        <span>Desconto</span>
                        <span style="color: var(--success);">- R$ 0,00</span>
                    </div>
                    <div class="resumo-item">
                        <span>Frete</span>
                        <span style="color: var(--success);">Grátis</span>
                    </div>

                    <div class="resumo-total">
                        <span>Total</span>
                        <span id="resumoTotal">R$ 0,00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ============================================ -->
    <!-- NOTIFICAÇÃO TOAST -->
    <!-- ============================================ -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span id="toastMessage">Pagamento realizado!</span>
        </div>
    </div>

    <!-- Scripts JavaScript -->
    <script src="../js/app.js"></script>
    <script>
        // ============================================
        // SCRIPT ESPECÍFICO DA PÁGINA DE PAGAMENTO
        // ============================================

        /**
         * Carrega os itens do carrinho no resumo do pedido
         */
        function loadResumo() {
            const cart = JSON.parse(localStorage.getItem('lilamarket-cart')) || [];
            const resumoItems = document.getElementById('resumoItems');
            const resumoSubtotal = document.getElementById('resumoSubtotal');
            const resumoTotal = document.getElementById('resumoTotal');

            if (cart.length === 0) {
                resumoItems.innerHTML = '<p style="color: var(--gray-500); padding: 1rem 0;">Seu carrinho está vazio</p>';
                resumoSubtotal.textContent = 'R$ 0,00';
                resumoTotal.textContent = 'R$ 0,00';
                return;
            }

            resumoItems.innerHTML = cart.map(item => `
                <div class="resumo-item">
                    <span>${item.product.name} (${item.quantity}x)</span>
                    <span>R$ ${(item.product.price * item.quantity).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0);
            resumoSubtotal.textContent = `R$ ${subtotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            resumoTotal.textContent = `R$ ${subtotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }

        // Seleção do método de pagamento
        document.querySelectorAll('.payment-method').forEach(method => {
            method.addEventListener('click', () => {
                document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
                method.classList.add('active');
                method.querySelector('input').checked = true;
            });
        });

        // Submissão do formulário de pagamento
        document.getElementById('paymentForm').addEventListener('submit', (e) => {
            e.preventDefault();

            // Mostra toast de sucesso
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = 'Pagamento realizado com sucesso!';
            toast.classList.add('active');

            // Limpa o carrinho
            localStorage.removeItem('lilamarket-cart');

            // Redireciona após delay
            setTimeout(() => {
                window.location.href = 'rastreamento.html';
            }, 2000);
        });

        // Formatação do número do cartão
        document.getElementById('cardNumber').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
            e.target.value = value;
        });

        // Formatação da data de validade
        document.getElementById('cardExpiry').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            e.target.value = value;
        });

        // Formatação do CPF
        document.getElementById('cpf').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 3) value = value.slice(0, 3) + '.' + value.slice(3);
            if (value.length > 7) value = value.slice(0, 7) + '.' + value.slice(7);
            if (value.length > 11) value = value.slice(0, 11) + '-' + value.slice(11, 13);
            e.target.value = value;
        });

        // Carrega o resumo ao iniciar a página
        loadResumo();
    </script>
</body>
</html>
